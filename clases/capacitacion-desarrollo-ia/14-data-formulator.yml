tema: "Data Formulator de Microsoft Research"
subtitulo: "Convierte datos complejos en gráficos claros, conversando con la IA 🎨"

diapositivas:
  - titulo: "¿Qué vamos a aprender hoy?"
    contenido:
      - tipo: "nota"
        texto: "Hoy descubriremos una herramienta de Microsoft que pone la IA a analizar datos por ti."
      - "Qué es Data Formulator y para qué sirve."
      - "Cómo combinar interfaz visual con conversación."
      - "Data Threads, conectores y el sandbox seguro."
      - tipo: "ejemplo"
        texto: "Imagina pedirle a la IA 'muéstrame las ventas por mes en un gráfico de barras' y verlo al instante."

  - titulo: "El problema: visualizar datos es tedioso"
    contenido:
      - tipo: "problema"
        texto: "¿Qué se necesita normalmente para crear un buen gráfico?"
      - "Limpiar y transformar los datos."
      - "Elegir el tipo de gráfico adecuado."
      - "Programar o configurar a mano cada detalle."
      - tipo: "ejemplo"
        texto: "Crear un dashboard puede llevar horas entre Excel, Python y ajustes visuales."
      - tipo: "nota"
        texto: "Data Formulator simplifica todo esto con IA conversacional."

  - titulo: "¿Qué es Data Formulator?"
    contenido:
      - "Es una herramienta de código abierto creada por Microsoft Research."
      - "Combina una interfaz visual (drag-and-drop) con agentes de IA."
      - tipo: "ejemplo"
        texto: "Como un Tableau inteligente: le hablas y él arma el gráfico."
      - tipo: "nota"
        texto: "Es de código abierto, así que puedes correrla gratis en tu propia máquina."

  - titulo: "Dos formas de usarlo: arrastrar o conversar"
    contenido:
      - tipo: "tabla"
        encabezados: ["Modo", "Cómo funciona", "Ideal para"]
        filas:
          - ["Arrastrar (drag-and-drop)", "Seleccionas columnas visualmente", "Tareas simples rápidas"]
          - ["Conversar (IA)", "Le pides en lenguaje natural", "Transformaciones complejas"]
      - tipo: "nota"
        texto: "Lo mejor: puedes mezclar ambos en cualquier momento."

  - titulo: "Ingesta multimodal: no solo archivos"
    contenido:
      - tipo: "problema"
        texto: "¿De dónde puedo sacar los datos?"
      - "Data Formulator acepta mucho más que CSVs."
      - tipo: "ejemplo"
        texto: "Puedes cargar imágenes, capturas de pantalla, archivos estructurados o URLs web."
      - tipo: "ejemplo"
        texto: "Subes la captura de un dashboard antiguo y la IA extrae sus métricas."
      - tipo: "nota"
        texto: "Esta flexibilidad es ideal para datos que viven en formatos heterogéneos."

  - titulo: "Data Threads: hilos de exploración ramificados"
    contenido:
      - tipo: "problema"
        texto: "¿Qué pasa si quiero explorar varias ideas a la vez?"
      - "En un chat normal, cada experimento sobrescribe el anterior."
      - "Data Formulator usa 'hilos' ramificados (branching)."
      - tipo: "ejemplo"
        texto: "Como las ramas de un árbol: cada rama es una línea de exploración independiente."
      - tipo: "nota"
        texto: "Si una idea no funcionó, vuelves a una rama anterior sin perder el trabajo."

  - titulo: "El sandbox: un entorno seguro para experimentar"
    contenido:
      - tipo: "problema"
        texto: "¿Es peligroso dejar que la IA ejecute código sobre mis datos?"
      - "Data Formulator ejecuta el código de transformación en un sandbox aislado."
      - tipo: "ejemplo"
        texto: "Es como una caja fuerte: la IA hace lo que quiera adentro sin tocar tu sistema."
      - tipo: "nota"
        texto: "Esto protege tu infraestructura: nada se ejecuta fuera del entorno controlado."

  - titulo: "Conectores corporativos (versión 0.7)"
    contenido:
      - tipo: "problema"
        texto: "¿Puedo conectarme a mis bases de datos corporativas?"
      - "La versión 0.7 incorpora conectores nativos robustos."
      - tipo: "tabla"
        encabezados: ["Conector", "Tipo de base"]
        filas:
          - ["PostgreSQL", "Relacional"]
          - ["BigQuery", "Analítica de Google"]
          - ["MySQL", "Relacional"]
          - ["Cosmos", "Documental"]
          - ["S3", "Almacenamiento de objetos"]
      - tipo: "nota"
        texto: "Conexión directa, sin exportar ni intermediarios."

  - titulo: "Estilización inteligente con lenguaje natural"
    contenido:
      - tipo: "problema"
        texto: "¿Y si quiero cambiar el aspecto del gráfico?"
      - "Data Formulator trae un 'Style-Refinement Agent': un agente especialista en estilo."
      - tipo: "ejemplo"
        texto: "Le dices: 'usa tonos azules y una tipografía moderna'. Y lo aplica."
      - tipo: "nota"
        texto: "No más pelear con menús de formato: se lo pides en español."

  - titulo: "Cómo levantarlo en local (uv)"
    contenido:
      - tipo: "calculo"
        texto: "uvx data_formulator"
      - tipo: "nota"
        texto: "Ese único comando descarga y ejecuta la herramienta, sin instalación permanente."
      - tipo: "nota"
        texto: "uv es un gestor de paquetes de Python rapidísimo que aísla el entorno."

  - titulo: "Data Threads vs chat lineal: comparativa"
    contenido:
      - tipo: "tabla"
        encabezados: ["Aspecto", "Chat lineal (ChatGPT)", "Data Threads"]
        filas:
          - ["Historial", "Se sobrescribe", "Se ramifica"]
          - ["Volver atrás", "Difícil o imposible", "Natural, como ramas"]
          - ["Paralelismo", "Uno a la vez", "Varias ideas a la vez"]
      - tipo: "nota"
        texto: "Los Data Threads son superiores para exploración analítica seria."

  - titulo: "Laboratorio: Visualizando logs con IA"
    contenido:
      - tipo: "problema"
        texto: "Levantaremos Data Formulator con 'uvx data_formulator'."
      - "Cargaremos un archivo de logs técnicos."
      - "Le pediremos a la IA que genere visualizaciones de rendimiento de red."
      - "Refinaremos la estética con comandos en lenguaje natural."
      - tipo: "nota"
        texto: "Te sorprenderá lo rápido que pasas de datos crudos a un dashboard claro."

  - titulo: "Preguntas para reflexionar"
    contenido:
      - tipo: "problema"
        texto: "¿Por qué los Data Threads son mejores que un chat lineal para análisis?"
      - tipo: "problema"
        texto: "¿Qué seguridad aporta el sandbox aislado a tu infraestructura?"
      - tipo: "nota"
        texto: "Piensa en un reporte aburrido de tu trabajo: ¿lo harías con Data Formulator?"

  - titulo: "Resumen: Lo que hoy aprendimos"
    contenido:
      - "🤖 Data Formulator combina drag-and-drop con IA conversacional."
      - "🧵 Los Data Threads ramifican la exploración sin perder trabajo."
      - "🔒 El sandbox aislado protege tu sistema durante la ejecución."
      - "🔌 Conectores corporativos robustos en la versión 0.7."
      - tipo: "nota"
        texto: "Visualizar datos complejos nunca fue tan fácil y conversacional. 🎉"
