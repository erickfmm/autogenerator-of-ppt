tema: "Teoría de Sistemas, Álgebra y Aproximación Universal"
subtitulo: "Entendiendo la IA desde cero, sin miedo a las matemáticas 🧠"

diapositivas:
  - titulo: "¿Qué vamos a aprender hoy?"
    contenido:
      - tipo: "nota"
        texto: "Esta clase es para principiantes. No hace falta ser matemático para entender la IA."
      - "Vamos a descubrir qué es realmente la IA (sin películas de ciencia ficción)."
      - "Aprenderemos cómo una computadora 'aprende' usando números."
      - "Veremos por qué las redes neuronales son tan poderosas."
      - tipo: "ejemplo"
        texto: "Imagina que quieres enseñarle a una computadora a reconocer fotos de perros: ¿cómo lo harías?"

  - titulo: "La IA NO es una mente mágica"
    contenido:
      - tipo: "problema"
        texto: "¿La IA piensa como un humano?"
      - "La respuesta corta es: NO. La IA no siente, ni piensa, ni tiene consciencia."
      - "La IA es, simplemente, un programa que transforma entradas en salidas."
      - "Es como una calculadora muy sofisticada: recibe datos y devuelve resultados."
      - tipo: "nota"
        texto: "Desmitificar la IA es el primer paso para usarla bien. No es magia, es matemática."

  - titulo: "¿Qué es un Sistema? (con ejemplo de la vida real)"
    contenido:
      - "Un sistema es cualquier cosa que recibe algo, lo procesa y devuelve algo."
      - tipo: "formula"
        texto: "ENTRADA → PROCESO → SALIDA"
      - tipo: "ejemplo"
        texto: "Una cafetería: entra agua y café molido, la máquina lo procesa, y sale una taza de café ☕."
      - tipo: "ejemplo"
        texto: "Un semáforo: recibe el tiempo transcurrido, lo procesa, y cambia de luz."
      - tipo: "nota"
        texto: "La IA también es un sistema: entra información (texto, imagen), y sale una respuesta."

  - titulo: "Clasificación de Sistemas (de fácil a difícil)"
    contenido:
      - tipo: "tabla"
        encabezados: ["Tipo de sistema", "Ejemplo", "Cómo se resuelve"]
        filas:
          - ["Lineal y simple", "Calcular el total de una compra", "Ágebra básica (suma)"]
          - ["Muchas variables", "Predecir el clima mañana", "Estadística"]
          - ["Muy complejo y no lineal", "Reconocer una cara en una foto", "Optimización con gradientes (IA)"]
      - tipo: "nota"
        texto: "Cuanto más complejo el problema, más potente debe ser la herramienta para resolverlo."

  - titulo: "¿Por qué necesitamos algo más que álgebra?"
    contenido:
      - "Con álgebra simple podemos resolver problemas directos."
      - tipo: "ejemplo"
        texto: "Si 2 manzanas cuestan $4, una manzana cuesta $2. Eso es álgebra."
      - "Pero, ¿cómo le explicas a una máquina qué es un 'perro' viendo miles de píxeles?"
      - "No hay una fórmula simple. Hay muchísimas variables mezcladas."
      - tipo: "nota"
        texto: "Para problemas muy complejos usamos las redes neuronales y el descenso de gradiente."

  - titulo: "Las Redes Neuronales son 'Funciones Plantilla'"
    contenido:
      - tipo: "problema"
        texto: "¿Qué es una red neuronal en palabras simples?"
      - "Imagina una receta de cocina con espacios en blanco para ajustar."
      - "La estructura de la receta es fija, pero las cantidades se pueden cambiar."
      - "En IA, esos 'ajustes' se llaman pesos y sesgos."
      - tipo: "formula"
        texto: "salida = función(peso × entrada + sesgo)"
      - tipo: "ejemplo"
        texto: "Si la entrada es una foto, los pesos deciden qué tan importante es cada píxel."

  - titulo: "¿Cómo 'aprende' la red? (paso a pasito)"
    contenido:
      - "Paso 1: La red hace una predicción (al principio, casi siempre se equivoca)."
      - - "Paso 2: Se mide qué tan equivocada estaba (eso es la función de costo)."
      - "Paso 3: Se ajustan los pesos un poquito para mejorar."
      - "Paso 4: Se repite muchas veces hasta que acierte."
      - tipo: "nota"
        texto: "Este ciclo de prueba y corrección, repetido miles de veces, es lo que llamamos 'entrenamiento'."

  - titulo: "El Descenso de Gradiente explicado fácil"
    contenido:
      - tipo: "ejemplo"
        texto: "Imagina que estás con los ojos vendados en una montaña y quieres bajar al valle."
      - "Sientes con el pie dónde el suelo baja más, y das un paso en esa dirección."
      - "Repetido muchas veces, llegas al punto más bajo (la mejor solución)."
      - tipo: "formula"
        texto: "nuevo_peso = peso_actual − (tamaño_paso × gradiente)"
      - tipo: "nota"
        texto: "El gradiente nos indica la dirección de mayor descenso. Ese es el truco de la IA."

  - titulo: "El Teorema de Aproximación Universal"
    contenido:
      - tipo: "problema"
        texto: "¿Por qué las redes neuronales sirven para TODO?"
      - "Existe un teorema matemático que dice algo sorprendente:"
      - "Una red neuronal con suficientes neuronas puede aproximar CUALQUIER función."
      - tipo: "formula"
        texto: "f(x) = Σ αᵢ · σ(wᵢ·x + bᵢ)"
      - tipo: "ejemplo"
        texto: "Da igual si quieres predecir precios, traducir idiomas o conducir un auto: la red puede aprenderlo."

  - titulo: "¿Qué significa 'no lineal' y por qué importa?"
    contenido:
      - "Lineal: si duplicas la entrada, la salida se duplica. Simple y predecible."
      - "No lineal: la relación es más compleja, con curvas y saltos."
      - tipo: "ejemplo"
        texto: "El precio de una casa NO sube igual de rápido cuando pasa de 1 a 2 habitaciones que de 10 a 11."
      - tipo: "nota"
        texto: "Sin funciones de activación no lineales, la red solo podría aprender relaciones simples."

  - titulo: "Laboratorio: ¡Vamos a practicar!"
    contenido:
      - tipo: "problema"
        texto: "Vamos a inicializar una red neuronal básica en Python."
      - "Pediremos a un modelo de IA que genere un script para visualizar el descenso de gradiente."
      - "Veremos en pantalla cómo los pesos se ajustan poco a poco."
      - tipo: "nota"
        texto: "No te preocupes si no programas: el asistente de IA te guiará paso a paso."

  - titulo: "Preguntas para reflexionar"
    contenido:
      - tipo: "problema"
        texto: "¿Por qué algunos problemas clásicos de TI no se pueden resolver con descenso de gradiente?"
      - tipo: "problema"
        texto: "¿Qué pasa en la infraestructura cuando pasamos de una fórmula cerrada a simulaciones intensivas?"
      - tipo: "nota"
        texto: "Piénsalo con calma. Discútelo con tu compañero. No hay respuestas únicas."

  - titulo: "Resumen: Lo que hoy aprendimos"
    contenido:
      - "🎯 La IA es un sistema que transforma entradas en salidas."
      - "🍽️ Las redes neuronales son 'recetas' con pesos ajustables."
      - "📉 Aprenden ajustando pesos con el descenso de gradiente."
      - "♾️ El teorema de aproximación universal permite aprender cualquier función."
      - tipo: "nota"
        texto: "¡Felicidades! Ya entiendes los cimientos matemáticos de la IA moderna. 🎉"
