tema: "Gestión de Proyectos de TI Asistida por IA"
subtitulo: "Cómo la IA te ayuda a gestionar proyectos (sin que te despidan) 📋"

diapositivas:
  - titulo: "¿Qué vamos a aprender hoy?"
    contenido:
      - tipo: "nota"
        texto: "Hoy veremos cómo la IA puede ayudarte en tareas de gestión, no solo técnicas."
      - "Cómo automatizar la gestión de adquisiciones."
      - "Cómo evaluar ofertas automáticamente (sin decidir por ti)."
      - "Cumplimiento legal (AEPD, LCSP) y colaboración ejecutiva."
      - tipo: "ejemplo"
        texto: "¿Te imaginas pedirle a la IA que compare 5 propuestas técnicas en segundos?"

  - titulo: "La gestión de TI tiene muchas tareas aburridas"
    contenido:
      - tipo: "problema"
        texto: "¿Qué tareas de gestión consumen tu tiempo?"
      - "Redactar bases de licitación (RFP, RFQ)."
      - "Evaluar decenas de propuestas técnicas."
      - "Tomar notas en reuniones y sintetizar acuerdos."
      - "Asegurar el cumplimiento de normativas."
      - tipo: "nota"
        texto: "La IA puede ayudarte con todas estas tareas administrativas, sin reemplazarte."

  - titulo: "Automatización de adquisiciones de TI"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo te ayuda la IA al comprar tecnología?"
      - "Redactar bases de licitación técnica consultando bases de conocimiento."
      - "Generar solicitudes de cotización (RFQ) estandarizadas."
      - tipo: "ejemplo"
        texto: "Le describes qué necesitas y la IA genera un RFP bien estructurado en minutos."
      - tipo: "nota"
        texto: "La IA acelera la redacción, pero la decisión final siempre es tuya."

  - titulo: "Evaluación semántica de ofertas (en segundos)"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo comparas 10 propuestas técnicas manualmente?"
      - "Leer cada una, comparar precios, plazos y cumplimiento con el pliego."
      - "Horas de trabajo tedioso y propenso a errores."
      - tipo: "ejemplo"
        texto: "La IA analiza todas las propuestas en segundos y arma una matriz comparativa."
      - tipo: "nota"
        texto: "¡Pero atención! Es una evaluación PARCIAL: tú decides y firmas."

  - titulo: "Lo que la IA SÍ puede hacer en evaluación"
    contenido:
      - tipo: "tabla"
        encabezados: ["Tarea", "¿La IA puede?"]
        filas:
          - ["Comparar precios automáticamente", "Sí"]
          - ["Detectar concordancia con el pliego", "Sí"]
          - ["Generar matriz de puntuación", "Sí (como sugerencia)"]
          - ["Firmar la decisión final", "¡NUNCA!"]
      - tipo: "nota"
        texto: "La IA es un copiloto: recomienda, pero el humano gobierna."

  - titulo: "El marco legal: IA en la contratación pública"
    contenido:
      - tipo: "problema"
        texto: "¿Se puede usar IA para contratar servicios públicos?"
      - "La AEPD (Agencia Española de Protección de Datos) publicó una guía."
      - "Permite el uso de IA generativa, pero con reglas estrictas."
      - tipo: "nota"
        texto: "Regla de oro: NUNCA delegar decisiones vinculantes a una 'caja negra' autónoma."

  - titulo: "Reglas clave de la AEPD"
    contenido:
      - "Prohibido: delegar la firma o decisión final a un sistema autónomo."
      - "Obligatorio: registrar todas las interacciones con la IA."
      - "Obligatorio: garantizar la transparencia del proceso."
      - "Obligatorio: que un humano valide cada paso crítico."
      - tipo: "nota"
        texto: "La LCSP (Ley de Contratos del Sector Público) exige esta transparencia."

  - titulo: "El flujo legal correcto"
    contenido:
      - tipo: "tabla"
        encabezados: ["Fase", "Responsable", "Rol de la IA"]
        filas:
          - ["Redacción del pliego", "Humano + IA", "Asistente de redacción"]
          - ["Evaluación de ofertas", "Humano", "Recomendador parcial"]
          - ["Firma administrativa", "Humano", "EXCLUIDA totalmente"]
      - tipo: "nota"
        texto: "El copiloto recomienda, el humano decide. La responsabilidad es siempre humana."

  - titulo: "Síntesis de reuniones ejecutivas con IA"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo capturo lo importante de una reunión sin perderme nada?"
      - "Herramientas como ReadAI y Microsoft Teams transcriben reuniones."
      - "La IA extrae planes de acción, responsables, plazos y temas clave."
      - tipo: "ejemplo"
        texto: "Termina la reunión y ya tienes: tareas asignadas, decisiones y un resumen ejecutivo."
      - tipo: "nota"
        texto: "Pero cuidado: las transcripciones pueden contener datos confidenciales."

  - titulo: "Privacidad en transcripciones ejecutivas"
    contenido:
      - tipo: "problema"
        texto: "¿Qué riesgos hay al transcribir reuniones estratégicas?"
      - "Las transcripciones pueden contener secretos comerciales."
      - "Si se suben a la nube de terceros, pueden filtrarse."
      - tipo: "nota"
        texto: "Medidas obligatorias: cifrado, control de acceso, retención limitada y consentimiento."

  - titulo: "Beneficios reales de usar IA en gestión"
    contenido:
      - tipo: "tabla"
        encabezados: ["Tarea", "Sin IA", "Con IA"]
        filas:
          - ["Redactar RFP", "3 horas", "30 minutos"]
          - ["Evaluar 10 ofertas", "2 días", "1 hora"]
          - ["Resumir reunión", "1 hora", "Automático"]
      - tipo: "nota"
        texto: "El ahorro de tiempo es enorme. Pero la responsabilidad sigue siendo tuya."

  - titulo: "Laboratorio: Evaluando ofertas con un prompt GOLD"
    contenido:
      - tipo: "problema"
        texto: "Simularemos un flujo de evaluación técnica corporativa."
      - "Cargaremos dos ofertas técnicas competidoras en el agente local."
      - "Usaremos un prompt GOLD para la evaluación parcial."
      - "La IA generará una matriz de puntuación para que el facilitador la valide."
      - tipo: "nota"
        texto: "Verás cómo la IA acelera la evaluación sin reemplazar tu criterio."

  - titulo: "Preguntas para reflexionar"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo se cumple la LCSP usando un copiloto de IA sin delegar la firma final?"
      - tipo: "problema"
        texto: "¿Qué medidas de seguridad aplicarías al transcribir reuniones confidenciales?"
      - tipo: "nota"
        texto: "Recuerda: la IA no firma, no decide, no reemplaza. Asiste."

  - titulo: "Resumen: Lo que hoy aprendimos"
    contenido:
      - "📑 La IA acelera redacción de pliegos y evaluación de ofertas."
      - "⚖️ El marco AEPD/LCSP exige decisión humana final siempre."
      - "🎙️ ReadAI y Teams sintetizan reuniones automáticamente."
      - "🔒 La privacidad de datos confidenciales es innegociable."
      - tipo: "nota"
        texto: "La IA recomienda, el humano decide y firma. La responsabilidad es tuya. 🎉"
