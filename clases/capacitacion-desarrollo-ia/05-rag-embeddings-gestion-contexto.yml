tema: "Gestión de Contexto, Embeddings Vectoriales y Arquitecturas RAG"
subtitulo: "Cómo darle a la IA memoria de tus documentos corporativos 📚"

diapositivas:
  - titulo: "¿Qué vamos a aprender hoy?"
    contenido:
      - tipo: "nota"
        texto: "Imagina que la IA pudiera leer todos los documentos de tu empresa antes de responder."
      - "Qué es RAG y por qué revoluciona el uso de IA en empresas."
      - "Por qué RAG clásico falla con código fuente."
      - "Qué es GraphRAG y por qué es más inteligente."
      - tipo: "ejemplo"
        texto: "¿Te gustaría preguntar '¿qué dice el manual sobre vacaciones?' y que la IA lo sepa?"

  - titulo: "El problema: la IA no conoce tu empresa"
    contenido:
      - tipo: "problema"
        texto: "ChatGPT no conoce tus políticas internas ni tu código. ¿Cómo lo solucionamos?"
      - "Opción 1: Reentrenar el modelo → carísimo, lento y difícil."
      - "Opción 2: RAG → darle documentos en el momento de la pregunta."
      - tipo: "nota"
        texto: "RAG es la solución práctica: combina el modelo con tu conocimiento sin reentrenar."

  - titulo: "¿Qué significa RAG?"
    contenido:
      - "RAG = Retrieval-Augmented Generation (Generación Aumentada por Recuperación)."
      - tipo: "formula"
        texto: "RAG = Recuperar documentos relevantes + Aumentar el prompt + Generar respuesta"
      - tipo: "ejemplo"
        texto: "Es como un examen a libro abierto: la IA busca la información antes de responder."
      - tipo: "nota"
        texto: "RAG es el estándar de facto para chatbots corporativos."

  - titulo: "Paso a paso: cómo funciona RAG"
    contenido:
      - "Paso 1: Tomas todos los documentos de la empresa."
      - "Paso 2: Los cortas en pedacitos (chunks)."
      - "Paso 3: Conviertes cada pedazo en un vector (embedding)."
      - "Paso 4: Guardas esos vectores en una base de datos vectorial."
      - "Paso 5: Cuando alguien pregunta, buscas los pedazos más parecidos."
      - "Paso 6: Se los pasas al modelo junto con la pregunta."
      - tipo: "nota"
        texto: "El modelo responde usando TU conocimiento, no solo lo que aprendió en entrenamiento."

  - titulo: "¿Cómo busca RAG los documentos correctos?"
    contenido:
      - tipo: "problema"
        texto: "Si tienes 10,000 documentos, ¿cómo encuentra los correctos en milisegundos?"
      - "No busca por palabras clave exactas. Busca por significado."
      - tipo: "ejemplo"
        texto: "Si preguntas '¿cómo reinicio el servidor?', encuentra 'reiniciar nodo de producción'."
      - tipo: "nota"
        texto: "Eso es búsqueda semántica: encuentra documentos que significan lo mismo, no que suenan igual."

  - titulo: "El problema del Chunking (cortar en pedazos)"
    contenido:
      - tipo: "problema"
        texto: "¿En qué tamaño corto los documentos?"
      - "Si los pedazos son muy chicos: pierden contexto."
      - "Si son muy grandes: gastan muchos tokens y se diluye la relevancia."
      - tipo: "tabla"
        encabezados: ["Estrategia", "Ventaja", "Riesgo"]
        filas:
          - ["Pedazos pequeños", "Precisión local", "Se pierde contexto global"]
          - ["Pedazos grandes", "Contexto global", "Mayor gasto de tokens"]
          - ["Con solapamiento", "Continuidad entre pedazos", "Más almacenamiento"]
      - tipo: "nota"
        texto: "El solapamiento (overlap) ayuda a que los pedazos compartan contexto en los bordes."

  - titulo: "Por qué RAG clásico FALLA con código fuente"
    contenido:
      - tipo: "problema"
        texto: "¿Qué pasa si le paso mi repositorio de código a un RAG normal?"
      - "El RAG corta el código como si fuera texto plano: línea por línea."
      - "Pero el código NO es texto plano: tiene estructura, funciones, dependencias."
      - tipo: "ejemplo"
        texto: "Si corta a la mitad de una función, pierde el contexto de qué hace esa función."
      - tipo: "nota"
        texto: "Resultado: el modelo alucina dependencias que no existen. Peligroso."

  - titulo: "GraphRAG: la evolución inteligente"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo hacemos que RAG entienda las relaciones entre los documentos?"
      - "GraphRAG construye un grafo (red) de conocimiento: conecta entidades y relaciones."
      - tipo: "ejemplo"
        texto: "Conecta 'Función A' → 'llama a' → 'Función B' → 'usa' → 'Base de datos'."
      - "Permite responder preguntas globales como '¿qué módulos dependen del login?'"
      - tipo: "nota"
        texto: "GraphRAG entiende la estructura, no solo el texto. Mucho más preciso."

  - titulo: "Tree-Sitter: entendiendo el código como un árbol"
    contenido:
      - "Tree-Sitter es una herramienta que analiza código y lo convierte en un árbol."
      - tipo: "ejemplo"
        texto: "Convierte `function suma(a,b){return a+b}` en una estructura jerárquica."
      - "Ese árbol (AST) respeta funciones, bloques y dependencias."
      - tipo: "formula"
        texto: "Código → Tree-Sitter → Árbol sintáctico (AST) → Base de datos local"
      - tipo: "nota"
        texto: "Así la IA puede explorar el código sin perder la estructura. Cero alucinaciones."

  - titulo: "Comparativa: RAG clásico vs GraphRAG"
    contenido:
      - tipo: "tabla"
        encabezados: ["Aspecto", "RAG clásico", "GraphRAG"]
        filas:
          - ["Búsqueda", "Por similitud de texto", "Por relaciones semánticas"]
          - ["Código fuente", "Falla (rompe estructura)", "Funciona (respeta AST)"]
          - ["Preguntas globales", "Difíciles", "Naturales"]
          - ["Costo de indexar", "Bajo", "Más alto (construye grafo)"]
      - tipo: "nota"
        texto: "Para conocimiento estructurado (como código), GraphRAG es muy superior."

  - titulo: "Laboratorio: Creando una base vectorial local"
    contenido:
      - tipo: "problema"
        texto: "Vamos a inicializar ChromaDB (una base vectorial local y liviana)."
      - "Cargaremos archivos Markdown de la empresa y generaremos sus embeddings."
      - "Haremos una búsqueda semántica: '¿dónde se define la política de backups?'"
      - "Compararemos con una búsqueda por palabras clave para ver la diferencia."
      - tipo: "nota"
        texto: "Verás cómo la búsqueda semántica encuentra respuestas que la clave no puede."

  - titulo: "Preguntas para reflexionar"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo afecta el tamaño del chunk a la calidad de las respuestas?"
      - tipo: "problema"
        texto: "¿Cuándo vale la pena GraphRAG frente a un RAG clásico?"
      - tipo: "nota"
        texto: "Piensa en qué documentos de TU empresa podrían beneficiarse de RAG."

  - titulo: "Resumen: Lo que hoy aprendimos"
    contenido:
      - "🗄️ RAG permite que la IA use tus documentos sin reentrenar."
      - "🔍 La búsqueda semántica encuentra por significado, no por palabra."
      - "⚠️ El RAG clásico falla con código: usa Tree-Sitter/GraphRAG."
      - "🕸️ GraphRAG conecta entidades para respuestas más inteligentes."
      - tipo: "nota"
        texto: "RAG es el puente entre el conocimiento de tu empresa y la IA. 🎉"
