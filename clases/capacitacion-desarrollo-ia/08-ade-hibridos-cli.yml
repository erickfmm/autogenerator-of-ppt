tema: "Entornos de Desarrollo de Agentes (ADE) Híbridos y CLI"
subtitulo: "Del autocompletado a los asistentes que programan solos 💻"

diapositivas:
  - titulo: "¿Qué vamos a aprender hoy?"
    contenido:
      - tipo: "nota"
        texto: "Hoy veremos cómo la IA está transformando el día a día del programador."
      - "Cómo evolucionaron los asistentes de código con IA."
      - "Diferencia entre IDEs visuales (Cursor) y CLI autónomos (Claude Code)."
      - "Ventajas y peligros de cada enfoque."
      - tipo: "ejemplo"
        texto: "Piensa en cuánto tiempo ahorrarías si la IA escribiera el código aburrido por ti."

  - titulo: "Antes vs Ahora: la evolución del desarrollo con IA"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo programábamos con IA hace 3 años vs hoy?"
      - "Antes: la IA solo autocompletaba una que otra línea (Copilot inicial)."
      - "Como el predictivo del celular: ayudaba, pero no entendía el contexto."
      - "Ahora: la IA lee todo tu proyecto, edita múltiples archivos y ejecuta comandos."
      - tipo: "nota"
        texto: "El salto fue enorme: pasamos de 'adivinar la siguiente línea' a 'hacer la tarea'."

  - titulo: "Dos enfoques: Visual vs Terminal"
    contenido:
      - tipo: "tabla"
        encabezados: ["Enfoque", "Ejemplos", "Estilo de trabajo"]
        filas:
          - ["IDE gráfico híbrido", "Cursor, Windsurf, VS Code Copilot", "Visual, apruebas línea por línea"]
          - ["CLI autónomo", "Claude Code, OpenCode", "Autónomo, trabaja solo en la terminal"]
      - tipo: "nota"
        texto: "Los visuales te dan control fino. Los CLI te dan autonomía total."

  - titulo: "IDEs híbridos: el programador sigue al mando"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo trabajan Cursor, Windsurf o VS Code Copilot?"
      - "Son editores visuales donde la IA propone cambios y tú los apruebas."
      - "Pueden editar varios archivos a la vez, de forma coordinada."
      - tipo: "ejemplo"
        texto: "El panel Composer de Cursor: describes qué quieres y él edita varios archivos."
      - tipo: "nota"
        texto: "Ideal para quien quiere control: tú decides qué se aplica y qué no."

  - titulo: "CLI autónomos: la IA trabaja sola en tu terminal"
    contenido:
      - tipo: "problema"
        texto: "¿Qué hace diferente a Claude Code u OpenCode?"
      - "Viven en tu terminal y actúan con mucha autonomía."
      - "Pueden explorar dependencias, arreglar compilaciones rotas, refactorizar."
      - tipo: "ejemplo"
        texto: "Le dices: 'arregla todos los tests que están fallando'. Y él solo lo hace."
      - tipo: "nota"
        texto: "Mayor poder, pero también mayor riesgo: hay que gestionar claves y presupuesto."

  - titulo: "Un día con un IDE híbrido (Cursor)"
    contenido:
      - tipo: "ejemplo"
        texto: "1. Abres tu proyecto y describes: 'agrega login con JWT'."
      - tipo: "ejemplo"
        texto: "2. Cursor muestra los cambios propuestos en varios archivos."
      - tipo: "ejemplo"
        texto: "3. Tú revisas cada cambio con un clic: aceptar o rechazar."
      - tipo: "ejemplo"
        texto: "4. Al final, tú decides qué queda. Tú tienes el control."
      - tipo: "nota"
        texto: "El flujo es conversacional pero siempre supervisado."

  - titulo: "Un día con un CLI autónomo (Claude Code)"
    contenido:
      - tipo: "ejemplo"
        texto: "1. En la terminal escribes: 'auditoría de seguridad del proyecto'."
      - tipo: "ejemplo"
        texto: "2. Claude Code explora archivos, lee el código y busca vulnerabilidades."
      - tipo: "ejemplo"
        texto: "3. Genera un archivo de parche (diff) con las correcciones."
      - tipo: "ejemplo"
        texto: "4. Tú revisas el diff y decides si aplicarlo con git."
      - tipo: "nota"
        texto: "Aquí la IA hace gran parte del trabajo pesado por su cuenta."

  - titulo: "Otros jugadores: Codex, Gemini CLI y Hermes"
    contenido:
      - tipo: "tabla"
        encabezados: ["Herramienta", "Fortaleza", "Debilidad"]
        filas:
          - ["Codex", "Maneja contextos masivos", "Soporte multilenguaje variable"]
          - ["Gemini CLI", "Integración con Google", "Ecosistema cerrado"]
          - ["Hermes", "Especialización", "Comunidad pequeña"]
      - tipo: "nota"
        texto: "No hay un ganador único: cada uno brilla en escenarios distintos."

  - titulo: "El peligro escondido: tokens y costos"
    contenido:
      - tipo: "problema"
        texto: "¿Qué pasa si dejo a un CLI autónomo trabajando sin control?"
      - "Puede hacer miles de llamadas a la API sin que te des cuenta."
      - "Tu factura de tokens puede dispararse."
      - tipo: "ejemplo"
        texto: "Un agente que explora 1000 archivos puede gastar millones de tokens en minutos."
      - tipo: "nota"
        texto: "Imprescindible: configurar límites de gasto y monitorear el uso."

  - titulo: "Buenas prácticas con ADEs"
    contenido:
      - "Usa contraseñas y claves API de forma segura (no en texto plano)."
      - "Configura límites de presupuesto de tokens."
      - "Revisa siempre los cambios propuestos antes de aceptarlos."
      - "Usa Git: si la IA rompe algo, puedes revertir."
      - tipo: "nota"
        texto: "La IA es un colaborador potentísimo, pero necesita supervisión humana."

  - titulo: "Laboratorio: Auditando código con un CLI"
    contenido:
      - tipo: "problema"
        texto: "Instalaremos Claude Code u OpenCode en tu máquina."
      - "Le pediremos auditar un proyecto heredado en busca de vulnerabilidades."
      - "El agente identificará problemas y generará archivos de parche (diff)."
      - "Revisaremos los diffs antes de aplicarlos."
      - tipo: "nota"
        texto: "Verás cómo un CLI puede ahorrarte horas de revisión manual."

  - titulo: "Preguntas para reflexionar"
    contenido:
      - tipo: "problema"
        texto: "¿Cuándo prefieres un IDE visual frente a un CLI autónomo?"
      - tipo: "problema"
        texto: "¿Cómo gestionarías el presupuesto de tokens en tu equipo?"
      - tipo: "nota"
        texto: "Piensa en qué tareas aburridas de tu día delegarías a un agente."

  - titulo: "Resumen: Lo que hoy aprendimos"
    contenido:
      - "📈 Los asistentes evolucionaron de autocompletar a ejecutar tareas."
      - "🖼️ IDEs híbridos: control visual, cambio por cambio."
      - "⌨️ CLIs: autonomía total en la terminal, con gran poder."
      - "💰 Gestionar tokens y claves es clave para no llevarse sorpresas."
      - tipo: "nota"
        texto: "El programador del futuro orquesta agentes, no escribe todo a mano. 🎉"
