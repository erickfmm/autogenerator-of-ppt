tema: "La Arquitectura del Transformer, Modelos Sequence-to-Sequence y Técnicas de Escalamiento"
subtitulo: "Los hitos arquitectónicos de la IA generativa ⚡"

diapositivas:
  - titulo: "¿Qué vamos a aprender?"
    contenido:
      - tipo: "nota"
        texto: "La arquitectura Transformer (2017) es el hito que posibilitó la revolución actual."
      - "Mecanismo de autoatención"
      - "Modelos BERT y MoE"
      - "Técnicas de escalamiento: LoRA y RoPE"

  - titulo: "Comparativa de Arquitecturas"
    contenido:
      - tipo: "tabla"
        encabezados: ["Arquitectura", "Contexto", "Ventaja", "Limitación"]
        filas:
          - ["Decodificadores Causales", "4k–128k+", "Generación de código", "Costo inferencia secuencial"]
          - ["Bidireccionales (BERT)", "~512 tokens", "Clasificación precisa", "No genera texto fluido"]
          - ["Mezcla de Expertos (MoE)", "Alta dinámica", "Alto rendimiento GPU", "Alta demanda VRAM"]

  - titulo: "El Mecanismo de Autoatención (Self-Attention)"
    contenido:
      - "Avance introducido por Google en 2017."
      - "Matriz de atención bidimensional que evalúa el peso relativo de cada término respecto a la secuencia completa."
      - tipo: "formula"
        texto: "Attention(Q, K, V) = softmax(Q·Kᵀ / √dₖ) · V"
      - tipo: "nota"
        texto: "Permite modelar dependencias a larga distancia sin recurrencia."

  - titulo: "El Modelo BERT y los Sequence-to-Sequence"
    contenido:
      - "BERT: modelo representacional bidireccional de bajo cómputo (≈300 MB)."
      - "Modelos secuencia a secuencia como mT5: diseñados para traducción y síntesis directa."
      - tipo: "ejemplo"
        texto: "BERT es ideal para clasificación, etiquetado POS y extracción de entidades."

  - titulo: "Arquitecturas de Mezcla de Expertos (MoE)"
    contenido:
      - "Modelos como Mixtral distribuyen tokens hacia expertos especializados."
      - "Una red de enrutamiento selecciona dinámicamente los expertos bajo un mapa de atención común."
      - tipo: "nota"
        texto: "MoE reduce los parámetros activos en GPU, optimizando la inferencia."

  - titulo: "Fine-Tuning Eficiente con LoRA y RoPE"
    contenido:
      - "LoRA (Low-Rank Adaptation): entrenamiento de parámetros con bajo cómputo GPU."
      - "RoPE (Rotary Position Embedding): escalamiento de ventanas de contexto."
      - tipo: "formula"
        texto: "W = W₀ + α · B·A   (LoRA: matrices rango bajo A, B)"
      - tipo: "nota"
        texto: "RoPE Scaling sin reentrenamiento masivo puede generar pérdida de consistencia."

  - titulo: "Laboratorio Práctico"
    contenido:
      - tipo: "problema"
        texto: "Cargar localmente SLMs como TinyLlama o Phi-2."
      - "Ejecutar scripts con adaptadores LoRA ligeros especializados en APIs corporativas."
      - "Medir tiempos de inferencia y consumo de VRAM."

  - titulo: "Preguntas Clave y Debate"
    contenido:
      - tipo: "problema"
        texto: "¿Cómo puede MoE optimizar costos de cómputo en servidores locales frente a modelos monolíticos?"
      - tipo: "problema"
        texto: "¿Qué riesgos de pérdida de consistencia surgen al escalar contexto con RoPE sin reentrenamiento?"

  - titulo: "Resumen"
    contenido:
      - "🔁 La autoatención permite modelar dependencias sin recurrencia."
      - "🎯 BERT destaca en clasificación; los MoE en rendimiento."
      - "🚀 LoRA y RoPE son claves para el escalamiento eficiente."
      - tipo: "nota"
        texto: "Estas técnicas habilitan el despliegue local de modelos especializados."
